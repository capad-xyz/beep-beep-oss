[package]
name = "beep-beep"
version = "0.0.0"
description = "beep-beep-oss client"
edition = "2021"
rust-version = "1.77"

# The library is what mobile (iOS/Android) links against; the binary is desktop.
# Both call into `run()` in lib.rs — that's how one codebase targets all platforms.
[lib]
name = "beep_beep_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }

# ⚠️ Pin the CURRENT version before building: `cargo add matrix-sdk`.
# The version below is indicative — the SDK moves fast. Features:
#   e2e-encryption → end-to-end encryption support
#   sqlite         → persist session + crypto keys on disk (fast restarts)
matrix-sdk = { version = "0.10", features = ["e2e-encryption", "sqlite"] }

# Generates TypeScript types from our Rust structs (keeps the boundary in sync).
ts-rs = "10"

[features]
# Tauri uses this to enable mobile-specific code paths.
default = []
